<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Navegação — CCO</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde:    #1a7a5e;
      --laranja:  #e07b39;
      --fundo:    #0f1f1a;
      --card:     #172821;
      --borda:    #2a4038;
      --claro:    #e0ede8;
      --muted:    #6b9080;
      --waze-bg:  #00b0cc;
      --maps-bg:  #4285f4;
    }

    html, body {
      height: 100%;
      background: var(--fundo);
      color: var(--claro);
      font-family: 'Rubik', sans-serif;
      overflow: hidden;
    }

    /* ── Layout ── */
    .nav-shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Barra superior ── */
    .top-bar {
      background: var(--card);
      border-bottom: 1px solid var(--borda);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
    }
    .top-bar-logo { font-size: .75rem; font-weight: 700; color: var(--laranja); letter-spacing: 1px; }
    .top-bar-rota { font-size: .72rem; color: var(--muted); }
    .btn-voltar {
      font-size: .78rem; color: var(--muted); text-decoration: none;
      padding: 4px 10px; border: 1px solid var(--borda); border-radius: 6px;
    }

    /* ── Progresso ── */
    .progress-bar-wrap {
      background: var(--card);
      padding: 10px 16px 6px;
      flex-shrink: 0;
    }
    .progress-label {
      font-size: .72rem; color: var(--muted); margin-bottom: 5px;
      display: flex; justify-content: space-between;
    }
    .progress-track {
      background: var(--borda); border-radius: 4px; height: 5px;
    }
    .progress-fill {
      background: var(--laranja); height: 5px; border-radius: 4px;
      transition: width .4s ease;
    }

    /* ── Card central da parada ── */
    .stop-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 20px 10px;
      text-align: center;
      overflow-y: auto;
    }

    .stop-badge {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--laranja);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 800; color: #fff;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(224,123,57,.4);
      flex-shrink: 0;
    }
    .stop-badge.is-origin { background: #22c55e; box-shadow: 0 4px 20px rgba(34,197,94,.4); }
    .stop-badge.is-done   { background: var(--muted); box-shadow: none; }

    .stop-tag {
      font-size: .68rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: .8px; margin-bottom: 6px; font-weight: 600;
    }

    .stop-address {
      font-size: 1.1rem; font-weight: 600; color: var(--claro);
      line-height: 1.4; margin-bottom: 8px;
    }

    .stop-coords {
      font-size: .72rem; color: var(--muted); margin-bottom: 16px;
      font-family: monospace;
    }

    /* ── Botões de navegação ── */
    .nav-btns {
      display: flex; flex-direction: column; gap: 10px;
      width: 100%; max-width: 340px; margin-bottom: 16px;
    }

    .btn-nav {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 16px; border-radius: 12px; border: none; cursor: pointer;
      font-family: 'Rubik', sans-serif; font-size: 1rem; font-weight: 700;
      color: #fff; text-decoration: none; transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-nav:active { opacity: .85; transform: scale(.98); }
    .btn-nav.waze  { background: var(--waze-bg); }
    .btn-nav.maps  { background: var(--maps-bg); }
    .btn-nav.disabled {
      background: var(--borda); color: var(--muted); pointer-events: none; cursor: default;
    }
    .btn-nav-icon { font-size: 1.3rem; }

    /* ── Rodapé de controle ── */
    .control-bar {
      background: var(--card);
      border-top: 1px solid var(--borda);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn-ctrl {
      flex: 1; padding: 14px; border-radius: 10px; border: none;
      font-family: 'Rubik', sans-serif; font-size: .95rem; font-weight: 700;
      cursor: pointer; transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-ctrl:active { opacity: .85; transform: scale(.98); }
    .btn-ctrl.prev { background: var(--borda); color: var(--claro); }
    .btn-ctrl.next { background: var(--laranja); color: #fff; flex: 2; }
    .btn-ctrl.next.finalizado { background: #22c55e; }
    .btn-ctrl:disabled { opacity: .35; cursor: default; }

    /* ── Mini-lista de paradas ── */
    .stops-strip {
      display: flex; gap: 6px; padding: 8px 16px;
      overflow-x: auto; flex-shrink: 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .stops-strip::-webkit-scrollbar { display: none; }
    .stop-dot {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .65rem; font-weight: 700; cursor: pointer;
      transition: transform .15s;
      border: 2px solid transparent;
    }
    .stop-dot.done    { background: var(--muted);   color: #fff; }
    .stop-dot.current { background: var(--laranja); color: #fff; border-color: #fff; transform: scale(1.15); }
    .stop-dot.pending { background: var(--borda);   color: var(--muted); }
    .stop-dot.origin  { background: #22c55e;        color: #fff; }

    /* ── Conclusão ── */
    .done-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 30px;
      text-align: center;
    }
    .done-icon { font-size: 4rem; margin-bottom: 16px; }
    .done-title { font-size: 1.4rem; font-weight: 700; color: #22c55e; margin-bottom: 8px; }
    .done-sub   { font-size: .9rem; color: var(--muted); }
  </style>
</head>
<body>

<div class="nav-shell">

  <!-- Barra superior -->
  <div class="top-bar">
    <div>
      <div class="top-bar-logo">CCO · Navegação</div>
      <div class="top-bar-rota">Rota #{{ session.id|stringformat:"s"|slice:":8"|upper }}</div>
    </div>
    <a href="javascript:history.back()" class="btn-voltar">← Voltar</a>
  </div>

  <!-- Progresso -->
  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span id="lbl-progresso">Parada 1 de {{ total }}</span>
      <span id="lbl-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Mini-lista de pontos -->
  <div class="stops-strip" id="stops-strip"></div>

  <!-- Card da parada atual -->
  <div class="stop-card" id="stop-card">
    <!-- preenchido pelo JS -->
  </div>

  <!-- Rodapé de controles -->
  <div class="control-bar">
    <button class="btn-ctrl prev" id="btn-prev" onclick="irPara(currentIdx - 1)">◀ Anterior</button>
    <button class="btn-ctrl next" id="btn-next" onclick="avancar()">Próxima Parada ▶</button>
  </div>

</div>

<script>
const STOPS  = {{ stops_json|safe }};
const TOTAL  = STOPS.length;
const SID    = "{{ session.id }}";
const LS_KEY = `cco_nav_${SID}`;

let currentIdx = parseInt(localStorage.getItem(LS_KEY) || '0', 10);
if (currentIdx >= TOTAL) currentIdx = 0;

// ── Renderiza o card da parada atual ─────────────────────────────────────
function render() {
  const s = STOPS[currentIdx];
  const isLast = currentIdx === TOTAL - 1;

  // Barra de progresso
  const pct = TOTAL <= 1 ? 100 : Math.round((currentIdx / (TOTAL - 1)) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('lbl-pct').textContent = pct + '%';

  const labelIdx = s.is_origin
    ? 'Ponto de Partida'
    : `Parada ${s.order} de ${TOTAL - (STOPS[0].is_origin ? 1 : 0)}`;
  document.getElementById('lbl-progresso').textContent = labelIdx;

  // Card principal
  const badgeClass = s.is_origin ? 'is-origin' : '';
  const badgeLabel = s.is_origin ? '★' : s.order;
  const coordStr   = `${s.lat.toFixed(6)}, ${s.lng.toFixed(6)}`;

  let wazeBtn = s.waze_url
    ? `<a href="${s.waze_url}" class="btn-nav waze" onclick="salvarProgresso()">
         <span class="btn-nav-icon">🚗</span> Abrir no Waze
       </a>`
    : `<div class="btn-nav disabled"><span class="btn-nav-icon">🚗</span> Waze (partida)</div>`;

  let mapsBtn = s.maps_url
    ? `<a href="${s.maps_url}" class="btn-nav maps" onclick="salvarProgresso()">
         <span class="btn-nav-icon">🗺️</span> Abrir no Google Maps
       </a>`
    : `<div class="btn-nav disabled"><span class="btn-nav-icon">🗺️</span> Maps (partida)</div>`;

  document.getElementById('stop-card').innerHTML = `
    <div class="stop-badge ${badgeClass}">${badgeLabel}</div>
    <div class="stop-tag">${s.is_origin ? 'PARTIDA' : 'DESTINO'}</div>
    <div class="stop-address">${s.label}</div>
    <div class="stop-coords">${coordStr}</div>
    <div class="nav-btns">
      ${wazeBtn}
      ${mapsBtn}
    </div>
  `;

  // Botões de controle
  document.getElementById('btn-prev').disabled = currentIdx === 0;
  const btnNext = document.getElementById('btn-next');
  if (isLast) {
    btnNext.textContent = '✔ Finalizar Rota';
    btnNext.classList.add('finalizado');
  } else {
    btnNext.textContent = 'Próxima Parada ▶';
    btnNext.classList.remove('finalizado');
  }

  // Mini-lista
  renderStrip();
  salvarProgresso();
}

function renderStrip() {
  const strip = document.getElementById('stops-strip');
  strip.innerHTML = STOPS.map((s, i) => {
    let cls = 'pending';
    if (i < currentIdx)     cls = 'done';
    if (i === currentIdx)   cls = 'current';
    if (s.is_origin)        cls += ' origin';
    const lbl = s.is_origin ? '★' : s.order;
    return `<div class="stop-dot ${cls}" onclick="irPara(${i})" title="${s.label}">${lbl}</div>`;
  }).join('');

  // Scroll para o dot atual
  const dots = strip.querySelectorAll('.stop-dot');
  if (dots[currentIdx]) {
    dots[currentIdx].scrollIntoView({ inline: 'center', behavior: 'smooth' });
  }
}

function avancar() {
  if (currentIdx >= TOTAL - 1) {
    mostrarConclusao();
    return;
  }
  irPara(currentIdx + 1);
}

function irPara(idx) {
  if (idx < 0 || idx >= TOTAL) return;
  currentIdx = idx;
  render();
}

function salvarProgresso() {
  localStorage.setItem(LS_KEY, currentIdx);
}

function mostrarConclusao() {
  localStorage.removeItem(LS_KEY);
  const card = document.getElementById('stop-card');
  card.innerHTML = `
    <div class="done-icon">🏁</div>
    <div class="done-title">Rota Concluída!</div>
    <div class="done-sub">Todas as paradas foram visitadas.<br>Bom trabalho!</div>
  `;
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('lbl-pct').textContent = '100%';
  document.getElementById('lbl-progresso').textContent = 'Concluída';
  document.getElementById('btn-next').disabled = true;
  document.getElementById('btn-prev').disabled = true;
}

// Inicializa
render();
</script>

</body>
</html>
